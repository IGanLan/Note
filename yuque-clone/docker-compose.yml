version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: yuque-clone-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yuque_user
      POSTGRES_PASSWORD: yuque_password
      POSTGRES_DB: yuque_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - yuque-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuque_user -d yuque_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yuque-clone-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: yuque_user
      DATABASE_PASSWORD: yuque_password
      DATABASE_NAME: yuque_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      UPLOAD_PATH: /app/uploads
    volumes:
      - ./backend/uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yuque-network

  # React 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    container_name: yuque-clone-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - yuque-network

volumes:
  postgres_data:

networks:
  yuque-network:
    driver: bridge
